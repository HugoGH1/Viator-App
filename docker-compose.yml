# =============================================================================
# ViatorBK - Docker Compose Unificado
# Levanta ambas APIs y sus respectivas bases de datos con un solo comando:
#   docker compose up --build
#  Primera vez: docker compose up --build
#  Para reinicio limpio docker compose down -v
#  Para detener: docker compose stop
#  Para eliminar: docker compose down
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Base de datos para el proyecto NestJS (viator)
  # Puerto externo: 3307
  # ---------------------------------------------------------------------------
  viator-mysql:
    image: mysql:8.0
    container_name: viator_nestjs_db
    restart: unless-stopped
    # SymmetricDS necesita crear funciones internas para los triggers
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_DATABASE: viator_db
      MYSQL_USER: viator_user
      MYSQL_PASSWORD: viator_password
      MYSQL_ROOT_PASSWORD: viator_root_password
    ports:
      - "3307:3306"
    volumes:
      - viator_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - viator-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pviator_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL - Réplica de solo lectura (CQRS Read Side)
  # Sincronizada desde MySQL vía SymmetricDS
  # Puerto externo: 5433
  # ---------------------------------------------------------------------------
  viator-postgres-read:
    image: postgres:16-alpine
    container_name: viator_read_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: viator_read_db
      POSTGRES_USER: viator_read_user
      POSTGRES_PASSWORD: viator_read_password
    ports:
      - "5433:5432"
    volumes:
      - viator_postgres_read_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - viator-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viator_read_user -d viator_read_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # SymmetricDS - Motor de replicación MySQL → PostgreSQL
  # Sincroniza cambios en near real-time (~5 segundos)
  # ---------------------------------------------------------------------------
  viator-symmetricds:
    build:
      context: ./symmetricds
      dockerfile: Dockerfile
    container_name: viator_symmetricds
    restart: unless-stopped
    depends_on:
      viator-mysql:
        condition: service_healthy
      viator-postgres-read:
        condition: service_healthy
    networks:
      - viator-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:31415/sync/mysql-master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Base de datos para el proyecto .NET (viatorAPI)
  # Puerto externo: 1434
  # ---------------------------------------------------------------------------
  viatorapi-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: viator_dotnet_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Viator_P@ss2026"
    ports:
      - "1434:1433"
    volumes:
      - viatorapi_sqlserver_data:/var/opt/mssql
    networks:
      - viator-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Viator_P@ss2026" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # API NestJS (viator) - Puerto 3000
  # ---------------------------------------------------------------------------
  viator-api:
    build:
      context: ./viator
      dockerfile: Dockerfile
    container_name: viator_nestjs_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://viator_user:viator_password@viator-mysql:3306/viator_db"
      DB_HOST: viator-mysql
      DB_PORT: "3306"
      DB_USER: viator_user
      DB_PASSWORD: viator_password
      DB_NAME: viator_db
      # PostgreSQL Read Replica
      READ_DATABASE_URL: "postgresql://viator_read_user:viator_read_password@viator-postgres-read:5432/viator_read_db"
      READ_DB_HOST: viator-postgres-read
      READ_DB_PORT: "5432"
      READ_DB_USER: viator_read_user
      READ_DB_PASSWORD: viator_read_password
      READ_DB_NAME: viator_read_db
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      viator-mysql:
        condition: service_healthy
      viator-postgres-read:
        condition: service_healthy
      viator-symmetricds:
        condition: service_healthy
    networks:
      - viator-network

  # ---------------------------------------------------------------------------
  # Cron Worker NestJS (viator-cron)
  # Background jobs, no expone puertos
  # ---------------------------------------------------------------------------
  viator-cron:
    build:
      context: .
      dockerfile: viator-cron/Dockerfile
    container_name: viator_nestjs_cron
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://viator_user:viator_password@viator-mysql:3306/viator_db"
      DB_HOST: viator-mysql
      DB_PORT: "3306"
      DB_USER: viator_user
      DB_PASSWORD: viator_password
      DB_NAME: viator_db
      # PostgreSQL Read Replica
      READ_DATABASE_URL: "postgresql://viator_read_user:viator_read_password@viator-postgres-read:5432/viator_read_db"
      READ_DB_HOST: viator-postgres-read
      READ_DB_PORT: "5432"
      READ_DB_USER: viator_read_user
      READ_DB_PASSWORD: viator_read_password
      READ_DB_NAME: viator_read_db
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      viator-mysql:
        condition: service_healthy
      viator-postgres-read:
        condition: service_healthy
      viator-symmetricds:
        condition: service_healthy
    networks:
      - viator-network

  # ---------------------------------------------------------------------------
  # API .NET (viatorAPI) - Puertos 8080 / 8081
  # ---------------------------------------------------------------------------
  viatorapi-api:
    build:
      context: ./viatorAPI
      dockerfile: Dockerfile
    container_name: viator_dotnet_api
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServerConnection: "Server=viatorapi-sqlserver,1433;Database=viator_db;User Id=sa;Password=Viator_P@ss2026;TrustServerCertificate=true"
    depends_on:
      viatorapi-sqlserver:
        condition: service_healthy
    networks:
      - viator-network

  # ---------------------------------------------------------------------------
  # Frontend Next.js (viatorFront) - Puerto 3001
  # ---------------------------------------------------------------------------
  viator-front:
    build:
      context: ./viatorFront
      dockerfile: Dockerfile
      args:
        # El navegador del cliente necesita acceder a estas URLs,
        # por lo que localhost apuntará a los puertos expuestos en la máquina host.
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
        NEXT_PUBLIC_AUTH_API_URL: "http://localhost:3000"
    container_name: viator_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      viator-api:
        condition: service_started
      viatorapi-api:
        condition: service_started
    networks:
      - viator-network

# =============================================================================
# Volúmenes nombrados - persisten datos aunque los contenedores se eliminen
# =============================================================================
volumes:
  viator_mysql_data:
  viatorapi_sqlserver_data:
  viator_postgres_read_data:

# =============================================================================
# Red compartida para comunicación entre servicios
# =============================================================================
networks:
  viator-network:
    driver: bridge
    name: viator_network
