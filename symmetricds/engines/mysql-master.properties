# =============================================================================
# SymmetricDS - Nodo Maestro (MySQL)
# Este nodo es el registration server y la fuente de datos
# =============================================================================

engine.name=mysql-master

# --- Identificación del nodo ---
group.id=master
external.id=master-000

# --- Registration Server ---
# Vacío = este nodo ES el registration server
registration.url=
sync.url=http://localhost:31415/sync/mysql-master

# --- Conexión a MySQL ---
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://viator-mysql:3306/viator_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.user=root
db.password=viator_root_password

# --- Configuración de sincronización ---
# Intervalo de push/pull en milisegundos (5 segundos)
job.push.period.time.ms=5000
job.pull.period.time.ms=5000

# Crear carga inicial antes de activar triggers
initial.load.create.first=true

# Auto-registrar nodos que se conecten
auto.registration=true

# Permitir creación automática de tablas en el destino
auto.sync.configuration=true

auto.config.database=false
auto.reload=true

job.routing.period.time.ms=5000
