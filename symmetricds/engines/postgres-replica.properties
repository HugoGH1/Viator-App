# =============================================================================
# SymmetricDS - Nodo Réplica (PostgreSQL)
# Este nodo recibe datos del maestro (solo lectura)
# =============================================================================

engine.name=postgres-replica

# --- Identificación del nodo ---
group.id=replica
external.id=replica-001

# --- Registration Server (el nodo MySQL) ---
registration.url=http://viator-symmetricds:31415/sync/mysql-master
sync.url=http://viator-symmetricds:31415/sync/postgres-replica

# --- Conexión a PostgreSQL ---
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://viator-postgres-read:5432/viator_read_db
db.user=viator_read_user
db.password=viator_read_password

# --- Configuración de sincronización ---
job.push.period.time.ms=5000
job.pull.period.time.ms=5000
